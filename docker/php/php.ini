; PHP settings for texturra — replicating the prod cPanel php.ini (ea-php83) values
; so local behaves like production for large product imports / image uploads.
memory_limit = 1024M
upload_max_filesize = 1024M
post_max_size = 1024M
max_execution_time = 300
max_input_time = 60
max_input_vars = 1000
date.timezone = UTC
