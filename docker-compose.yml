# Local dev stack for texturra.ro — target-aligned (nginx + php-fpm 8.3 + mysql 8 + redis + mailpit).
# Node and Horizon are behind compose profiles so the base stack stays lean.
# All credentials come from .env — nothing hardcoded.

services:
    nginx:
        image: nginx:alpine
        ports:
            - '${APP_PORT:-8080}:80'
        volumes:
            - './:/var/www/html'
            - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro'
        depends_on:
            - php
        networks:
            - texturra

    php:
        build:
            context: ./docker/php
            args:
                UID: '${UID:-1000}'
                GID: '${GID:-1000}'
        volumes:
            - './:/var/www/html'
            - './docker/php/php.ini:/usr/local/etc/php/conf.d/zz-texturra.ini:ro'
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started
        networks:
            - texturra

    mysql:
        image: mysql:8.0
        command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_ROOT_PASSWORD}'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - 'texturra_mysql:/var/lib/mysql'
        networks:
            - texturra
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${DB_ROOT_PASSWORD}']
            retries: 10
            interval: 5s
            timeout: 5s

    redis:
        image: redis:alpine
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'texturra_redis:/data'
        networks:
            - texturra
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            retries: 5
            timeout: 3s

    mailpit:
        image: axllent/mailpit:latest
        ports:
            - '${FORWARD_MAILPIT_SMTP_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_UI_PORT:-8025}:8025'
        networks:
            - texturra

    horizon:
        build:
            context: ./docker/php
            args:
                UID: '${UID:-1000}'
                GID: '${GID:-1000}'
        command: php artisan horizon
        volumes:
            - './:/var/www/html'
            - './docker/php/php.ini:/usr/local/etc/php/conf.d/zz-texturra.ini:ro'
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started
        networks:
            - texturra
        profiles:
            - horizon

    node:
        image: node:20-alpine
        working_dir: /var/www/html
        command: npm run dev -- --host
        ports:
            - '${FORWARD_VITE_PORT:-5173}:5173'
        volumes:
            - './:/var/www/html'
        networks:
            - texturra
        profiles:
            - node

networks:
    texturra:
        driver: bridge

volumes:
    texturra_mysql:
        driver: local
    texturra_redis:
        driver: local
